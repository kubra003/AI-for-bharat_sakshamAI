name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Run ESLint
      working-directory: frontend
      run: npx eslint src/ --ext .js,.jsx --max-warnings 0 || true
      continue-on-error: true

  backend-lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install pylint flake8 black
    
    - name: Run pylint
      run: |
        find backend -name "lambda_function.py" -exec pylint {} \; --disable=C0111,C0103,W0703 || true
      continue-on-error: true
    
    - name: Run flake8
      run: |
        flake8 backend/ --exclude=node_modules,__pycache__,*.pyc --max-line-length=120 || true
      continue-on-error: true
    
    - name: Check formatting with black
      run: |
        black --check backend/ --exclude="/(node_modules|__pycache__|\.pyc)/" || true
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run npm audit
      working-directory: frontend
      run: npm audit --audit-level=moderate || true
      continue-on-error: true
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
