name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lambda: [currency_detector, prescription_reader, text_to_speech, vision_orchestrator]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f backend/${{ matrix.lambda }}/requirements.txt ]; then
          pip install -r backend/${{ matrix.lambda }}/requirements.txt
        fi
        pip install pytest pylint boto3
    
    - name: Lint with pylint
      run: |
        if [ -f backend/${{ matrix.lambda }}/lambda_function.py ]; then
          pylint backend/${{ matrix.lambda }}/lambda_function.py --disable=C0111,C0103,W0703 || true
        fi
      continue-on-error: true
    
    - name: Run tests
      run: |
        if [ -f backend/${{ matrix.lambda }}/test_lambda.py ]; then
          pytest backend/${{ matrix.lambda }}/test_lambda.py -v
        else
          echo "No tests found for ${{ matrix.lambda }}"
        fi
      continue-on-error: true

  package:
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        lambda: [currency_detector, prescription_reader, text_to_speech, vision_orchestrator]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Package Lambda function
      run: |
        cd backend/${{ matrix.lambda }}
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt -t .
        fi
        zip -r lambda.zip . -x "*.git*" -x "*__pycache__*" -x "*.pyc" -x "deploy.sh" -x "*.md"
    
    - name: Upload Lambda package
      uses: actions/upload-artifact@v4
      with:
        name: lambda-${{ matrix.lambda }}
        path: backend/${{ matrix.lambda }}/lambda.zip
        retention-days: 7
